<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { display: block; margin: 10px auto; padding: 8px; width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { color: green; margin-bottom: 1rem; }
        .error { color: red; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login / Register</h2>
        <div id="message" class="message"></div>
        <div id="error" class="error"></div>
        
        <form action="/login" method="POST" id="loginForm">
            <h3>Login</h3>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <hr>

        <form action="/register" method="POST" id="registerForm">
            <h3>Register</h3>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const message = urlParams.get('message');
        const error = urlParams.get('error');
        const loginMessage = document.getElementById('message');
        if (message) loginMessage.innerText = message;
        if (error) document.getElementById('error').innerText = error;
    </script>
</body>
</html>
